<!DOCTYPE html>
<html>
    <head>
        <title>Add new job opportunity</title>
        <style>
            body
            {
                text-align: center;
            }
            .job_description
            {
                height: 100px;
            }
            
        </style>
    </head>

    <body>
        <div class = "Add new job opportunity">
            <h1>Add new job</h1>
            <h3>Please enter job details: </h3>
            <p>Enter job id: </p>     <input placeholder="Enter job id" type="number">
            <p>Enter job title:</p>   <input placeholder="Enter job title" type="text">
            <p>Enter job salary</p>   <input placeholder="Enter job salary" type="number">
            <p>Enter company name</p> <input placeholder="Enter company name" type="text">
            <p>Enter job status: </p>
            <select>
                <option>Open</option>
                <option>Closed</option>
            </select>
            <p>Type job description:</p> <input class = "job_description" placeholder="Type job description">
            <p>Enter years of experience</p> <input placeholder="Enter years of experience" type="number">
        </div>        
    </body>
</html>
